DROP TABLE IF EXISTS sc;
DROP TABLE IF EXISTS student;
DROP TABLE IF EXISTS course;

CREATE TABLE student (
  student_id TEXT PRIMARY KEY,
  name TEXT NOT NULL,
  gender TEXT CHECK(gender IN ('男','女')),
  department TEXT,
  birth_year INTEGER
);

CREATE TABLE course (
  course_id TEXT PRIMARY KEY,
  course_name TEXT NOT NULL,
  credit INTEGER,
  teacher TEXT
);

CREATE TABLE sc (
  student_id TEXT,
  course_id TEXT,
  score INTEGER,
  PRIMARY KEY(student_id, course_id),
  FOREIGN KEY(student_id) REFERENCES student(student_id),
  FOREIGN KEY(course_id) REFERENCES course(course_id)
);

// ============ 全局状态 ============
let SQL, db;
let currentGroup = GROUPS[0].key;
let progress = JSON.parse(localStorage.getItem('sqlplay_progress_v3') || '{}');

// ============ 初始化 ============
async function init() {
  try {
    SQL = await initSqlJs({ locateFile: f => `https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/${f}` });
    resetDB(true);
    setStatus('ready', '就绪 · SQLite in-browser');
    renderNav();
    renderMain(currentGroup);
    updateProgress();
  } catch (e) {
    setStatus('error', '加载失败: ' + e.message);
    console.error(e);
  }
}

function setStatus(cls, text) {
  const el = document.getElementById('status-badge');
  el.className = cls;
  el.textContent = text;
}

function resetDB(silent) {
  if (db) db.close();
  db = new SQL.Database();
  db.run(INIT_SQL);
  if (!silent) alert('数据库已重置为初始状态。');
}

// ============ 侧边栏导航 ============
function renderNav() {
  const container = document.getElementById('nav-list');
  let html = '';
  GROUPS.forEach(g => {
    const groupPassed = LESSONS.filter(L => L.group === g.key && progress[L.id] === 'passed').length;
    const groupTotal = LESSONS.filter(L => L.group === g.key).length;
    html += `<div class="lesson-group ${g.key === currentGroup ? 'active' : ''}" onclick="selectGroup('${g.key}')">
      <span>${g.icon}</span>
      <span>${g.title}</span>
      <span style="margin-left:auto;font-size:11px;color:#8b949e;font-weight:400;">${groupPassed}/${groupTotal}</span>
    </div>`;
    if (g.key === currentGroup) {
      LESSONS.filter(L => L.group === g.key).forEach(L => {
        const state = progress[L.id] || 'none';
        html += `<div class="lesson-item ${state}" onclick="scrollToQu('${L.id}')">
          <span class="lesson-num">${L.id}</span>
          <span class="title-text">${L.title}</span>
          <span class="status-dot"></span>
        </div>`;
      });
    }
  });
  container.innerHTML = html;
}

function selectGroup(key) {
  currentGroup = key;
  renderNav();
  renderMain(key);
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function scrollToQu(id) {
  const el = document.getElementById('qu-' + id);
  if (el) el.scrollIntoView({behavior: 'smooth', block: 'start'});
}

// ============ 主区渲染 ============
function renderMain(groupKey) {
  const g = GROUPS.find(x => x.key === groupKey);
  const lessons = LESSONS.filter(L => L.group === groupKey);
  const main = document.getElementById('main-content');

  let html = `
    <div class="group-header">
      <h1>${g.icon} ${g.title}</h1>
      <div class="subtitle">${g.subtitle}</div>
    </div>
    ${renderDBPreview(g.tables)}
  `;

  lessons.forEach(L => {
    html += renderQu(L);
  });

  main.innerHTML = html;

  // 绑定每题的事件
  lessons.forEach(L => bindQuEvents(L));
}

// ============ 顶部数据表预览 ============
function renderDBPreview(tables) {
  const tabs = tables.map((t, i) =>
    `<div class="tab ${i === 0 ? 'active' : ''}" onclick="switchDBTab('${t}', this)">${t}</div>`
  ).join('');
  return `
    <div class="db-preview">
      <div class="db-preview-header">
        <span>📊 数据表预览（本节涉及的表，共 ${tables.length} 张）</span>
        <div class="tabs">${tabs}</div>
      </div>
      <div class="db-preview-body" id="db-preview-body">${renderTablePreview(tables[0])}</div>
    </div>
  `;
}

function switchDBTab(t, el) {
  el.parentNode.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('db-preview-body').innerHTML = renderTablePreview(t);
}

function renderTablePreview(t) {
  try {
    const res = db.exec(`SELECT * FROM ${t}`);
    if (!res.length) return '<div style="padding:20px;color:#8b949e">（空表）</div>';
    const { columns, values } = res[0];
    const shown = values.slice(0, 8);
    let html = '<table><thead><tr>';
    columns.forEach(c => { html += `<th>${escapeHtml(c)}</th>`; });
    html += '</tr></thead><tbody>';
    shown.forEach(row => {
      html += '<tr>';
      row.forEach(v => {
        const isNum = typeof v === 'number';
        const cls = isNum ? ' class="r"' : '';
        html += `<td${cls}>${v === null ? '<i style="color:#8b949e">NULL</i>' : escapeHtml(String(v))}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    if (values.length > shown.length) {
      html += `<div style="padding:6px 12px;color:#8b949e;font-size:11px;">…共 ${values.length} 行，仅显示前 ${shown.length} 行</div>`;
    }
    return html;
  } catch (e) {
    return `<div style="padding:20px;color:#cf222e">读取失败: ${e.message}</div>`;
  }
}

// ============ 题目卡片渲染 ============
function renderQu(L) {
  const state = progress[L.id] || 'none';
  const stateIcon = state === 'passed' ? '✅' : (state === 'attempted' ? '🟠' : '');
  return `
    <div class="qu" id="qu-${L.id}">
      <h2>
        <span class="qid">${L.id}</span>
        <span>${L.title}</span>
        <span class="badge ${L.difficulty}">${difficultyLabel(L.difficulty)}</span>
        <span style="margin-left:auto;font-size:14px">${stateIcon}</span>
      </h2>
      <div class="intro">${L.intro}</div>
      <div class="imper">🎯 ${L.imper}</div>
      ${L.note ? `<div class="note">📌 ${L.note}</div>` : ''}
      <div class="editor-wrap">
        <textarea id="sql-${L.id}" spellcheck="false">${escapeHtml(L.starter)}</textarea>
        <button class="reset-starter" onclick="resetStarter('${L.id}')" title="恢复起手 SQL">↺ 起手</button>
      </div>
      <div class="qu-actions">
        <button class="blue" onclick="runQu('${L.id}')">▶ 运行</button>
        <button class="primary" onclick="checkQu('${L.id}')">✓ 对答案</button>
        <button class="ghost" onclick="clearQu('${L.id}')">🗑 清空</button>
      </div>
      <div class="feedback" id="feedback-${L.id}"></div>
      <div class="result-box" id="result-${L.id}">
        <div class="result-header">
          <span id="result-title-${L.id}">运行结果</span>
          <span id="result-meta-${L.id}"></span>
        </div>
        <div class="result-body" id="result-body-${L.id}"></div>
      </div>
      ${(() => {
        const hintsArr = L.hints || (L.hint ? [L.hint] : ['独立思考一下~']);
        const total = hintsArr.length;
        if (total <= 1) {
          return `<details class="hint-block"><summary>💡 提示</summary><div>${hintsArr[0]}</div></details>`;
        }
        const items = hintsArr.map((h, i) => `<div class="hint-item" id="hint-item-${L.id}-${i}"${i > 0 ? ' style="display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #ffdfb5"' : ''}><b>提示 ${i + 1}：</b>${h}</div>`).join('');
        return `<details class="hint-block">
        <summary>💡 分级提示 · <span id="hint-shown-${L.id}">1</span>/${total}</summary>
        <div>
          ${items}
          <button id="hint-more-${L.id}" onclick="showNextHint('${L.id}', ${total})" style="margin-top:10px; font-size:12px; padding:4px 10px; background:#fff; border:1px solid #ffdfb5; color:#953800; border-radius:4px; cursor:pointer;">👇 继续查看下一条提示</button>
        </div>
      </details>`;
      })()}
      <details class="ans-block">
        <summary>👀 参考答案</summary>
        <div>
          <div id="ans-warn-${L.id}" style="padding:4px 0;">
            <div style="color:#57606a; font-size:12px; margin-bottom:6px;">⚠️ 看答案后就不算你独立完成了哦～建议先按提示多试几次</div>
            <button onclick="revealAnswer('${L.id}')" style="font-size:12px; padding:4px 12px; background:#0969da; color:white; border:none; border-radius:4px; cursor:pointer;">我已知晓，展示答案</button>
          </div>
          <pre id="ans-code-${L.id}" style="display:none">${escapeHtml(L.answer)}</pre>
        </div>
      </details>
    </div>
  `;
}

function bindQuEvents(L) {
  const ta = document.getElementById('sql-' + L.id);
  if (!ta) return;
  // Tab 缩进
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = this.selectionStart, en = this.selectionEnd;
      this.value = this.value.substring(0, s) + '  ' + this.value.substring(en);
      this.selectionStart = this.selectionEnd = s + 2;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQu(L.id);
    }
  });
}

function difficultyLabel(d) {
  return { easy: '简单', medium: '中等', hard: '困难' }[d] || d;
}

// ============ 每题的运行/对答/清空 ============
function getSQL(qid) {
  return document.getElementById('sql-' + qid).value.trim();
}

function runQu(qid) {
  const sql = getSQL(qid);
  if (!sql) { showQuFeedback(qid, 'fail', '请先输入 SQL 语句。'); return; }
  const box = document.getElementById('result-' + qid);
  const body = document.getElementById('result-body-' + qid);
  const title = document.getElementById('result-title-' + qid);
  const meta = document.getElementById('result-meta-' + qid);
  hideQuFeedback(qid);
  box.classList.add('show');
  try {
    const t0 = performance.now();
    const results = db.exec(sql);
    const dt = (performance.now() - t0).toFixed(1);
    title.textContent = '✓ 运行成功';
    if (!results.length) {
      body.innerHTML = '<div style="padding:16px;color:#6e7781;text-align:center;font-size:13px">✓ 执行成功，无返回结果（可能是 DDL/DML 语句）</div>';
      meta.textContent = `${dt}ms`;
    } else {
      const html = results.map(r => renderResultTable(r.columns, r.values)).join('');
      body.innerHTML = html;
      const total = results.reduce((s, r) => s + r.values.length, 0);
      meta.textContent = `${total} 行 · ${dt}ms`;
    }
    // 标记为尝试过
    if (progress[qid] !== 'passed') {
      progress[qid] = 'attempted';
      saveProgress(); renderNav(); updateProgress();
    }
  } catch (e) {
    title.textContent = '✗ 语法错误';
    meta.textContent = '';
    body.innerHTML = `<div class="err-msg">${escapeHtml(e.message)}</div>`;
    showQuFeedback(qid, 'fail', '❌ SQL 报错，请检查语法。');
  }
}

function checkQu(qid) {
  const L = LESSONS.find(x => x.id === qid);
  const sql = getSQL(qid);
  if (!sql) { showQuFeedback(qid, 'fail', '请先输入 SQL 语句。'); return; }
  let userRes, refRes;
  try { userRes = db.exec(sql); }
  catch (e) { showQuFeedback(qid, 'fail', '❌ 你的 SQL 报错：' + escapeHtml(e.message)); return; }
  try { refRes = db.exec(L.answer); }
  catch (e) { showQuFeedback(qid, 'fail', '⚠️ 参考答案执行失败：' + escapeHtml(e.message)); return; }

  // 也顺便显示运行结果
  const box = document.getElementById('result-' + qid);
  const body = document.getElementById('result-body-' + qid);
  const title = document.getElementById('result-title-' + qid);
  const meta = document.getElementById('result-meta-' + qid);
  box.classList.add('show');
  if (userRes.length) {
    body.innerHTML = renderResultTable(userRes[0].columns, userRes[0].values);
    title.textContent = '你的结果';
    meta.textContent = `${userRes[0].values.length} 行`;
  }

  const cmp = compareResults(userRes, refRes, L.strictOrder);
  if (cmp.pass) {
    showQuFeedback(qid, 'pass', `✅ <b>通过！</b> ${cmp.msg}`);
    progress[qid] = 'passed';
    saveProgress(); renderNav(); updateProgress();
    // 卡片头的状态图标更新
    const iconEl = document.querySelector(`#qu-${qid} h2 > span:last-child`);
    if (iconEl) iconEl.textContent = '✅';
  } else {
    showQuFeedback(qid, 'fail', `❌ <b>未通过。</b> ${cmp.msg}`);
    if (progress[qid] !== 'passed') {
      progress[qid] = 'attempted';
      saveProgress(); renderNav(); updateProgress();
    }
  }
}

function clearQu(qid) {
  document.getElementById('sql-' + qid).value = '';
  hideQuFeedback(qid);
  document.getElementById('result-' + qid).classList.remove('show');
}

function resetStarter(qid) {
  const L = LESSONS.find(x => x.id === qid);
  document.getElementById('sql-' + qid).value = L.starter;
  hideQuFeedback(qid);
}

function showQuFeedback(qid, cls, msg) {
  const el = document.getElementById('feedback-' + qid);
  el.className = 'feedback show ' + cls;
  el.innerHTML = msg;
}
function hideQuFeedback(qid) {
  document.getElementById('feedback-' + qid).className = 'feedback';
}

// ============ 结果表渲染 ============
function renderResultTable(columns, values, maxRows) {
  const rows = maxRows ? values.slice(0, maxRows) : values;
  const more = maxRows && values.length > maxRows ? `<div style="padding:6px;color:#8b949e;font-size:11px;text-align:center;">…共 ${values.length} 行，仅显示前 ${maxRows} 行</div>` : '';
  let html = '<table class="result"><thead><tr>';
  columns.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
  html += '</tr></thead><tbody>';
  rows.forEach(row => {
    html += '<tr>';
    row.forEach(v => {
      html += v === null ? '<td class="null">NULL</td>' : `<td>${escapeHtml(String(v))}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>' + more;
  return html;
}

// ============ 比较 ============
function compareResults(userRes, refRes, strictOrder) {
  if (!userRes.length && !refRes.length) return { pass: true, msg: '双方均无返回。' };
  if (!userRes.length) return { pass: false, msg: '你的 SQL 没有返回结果集。' };
  if (!refRes.length) return { pass: false, msg: '参考答案无返回，但你的有。' };
  const u = userRes[0], r = refRes[0];
  if (u.columns.length !== r.columns.length) return { pass: false, msg: `列数不一致：你 ${u.columns.length} 列，期望 ${r.columns.length} 列。` };
  if (u.values.length !== r.values.length) return { pass: false, msg: `行数不一致：你 ${u.values.length} 行，期望 ${r.values.length} 行。` };
  const uv = strictOrder ? u.values : sortRows(u.values);
  const rv = strictOrder ? r.values : sortRows(r.values);
  for (let i = 0; i < uv.length; i++) {
    for (let j = 0; j < uv[i].length; j++) {
      const a = uv[i][j], b = rv[i][j];
      if (typeof a === 'number' && typeof b === 'number') {
        if (Math.abs(a - b) > 0.001) return { pass: false, msg: `第 ${i+1} 行第 ${j+1} 列：你=${a}，期望=${b}。` };
      } else if (String(a ?? '') !== String(b ?? '')) {
        const ordNote = strictOrder ? '（本题要求严格按 ORDER BY 排序）' : '';
        return { pass: false, msg: `第 ${i+1} 行第 ${j+1} 列${ordNote}：你="${a}"，期望="${b}"。` };
      }
    }
  }
  return { pass: true, msg: `列数 ${u.columns.length}，行数 ${u.values.length}，全部匹配。` };
}

function sortRows(rows) {
  return rows.slice().sort((a, b) => {
    for (let i = 0; i < a.length; i++) {
      const av = String(a[i] ?? ''), bv = String(b[i] ?? '');
      if (av < bv) return -1;
      if (av > bv) return 1;
    }
    return 0;
  });
}

// ============ 进度 ============
function saveProgress() { localStorage.setItem('sqlplay_progress_v3', JSON.stringify(progress)); }
function updateProgress() {
  const passed = Object.values(progress).filter(v => v === 'passed').length;
  document.getElementById('progress-text').textContent = `进度 ${passed} / ${LESSONS.length}`;
  document.getElementById('progress-bar-inner').style.width = (passed / LESSONS.length * 100) + '%';
}
function resetProgress() {
  if (!confirm('确定清除所有进度？（数据库不受影响）')) return;
  progress = {}; saveProgress(); renderNav(); updateProgress();
  renderMain(currentGroup); // 刷新卡片状态图标
}

// ============ 工具 ============
function showNextHint(qid, total) {
  const shownEl = document.getElementById('hint-shown-' + qid);
  if (!shownEl) return;
  let shown = parseInt(shownEl.textContent);
  if (shown < total) {
    const nextItem = document.getElementById(`hint-item-${qid}-${shown}`);
    if (nextItem) nextItem.style.display = '';
    shown++;
    shownEl.textContent = shown;
    if (shown >= total) {
      const btn = document.getElementById('hint-more-' + qid);
      if (btn) btn.style.display = 'none';
    }
  }
}

function revealAnswer(qid) {
  const warn = document.getElementById('ans-warn-' + qid);
  const code = document.getElementById('ans-code-' + qid);
  if (warn) warn.style.display = 'none';
  if (code) code.style.display = '';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

init();
</script>
